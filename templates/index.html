<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Online Desktop</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="scripts.js"></script>
</head>
<body onload="startTime()">
    <div class="container">
        <div class="top">
            <div id="date">Date</div>
            <h1>Ty's Personal Desktop</h1>
            <div id="clock"></div>
        </div>
        <div class="main">
           <div class = 'widget'>
               <h3>Widget 01</h3>
           </div>
           <div class = 'widget'>
            <h3>SCARRRRRED FOR LYFE</h3>
            <iframe width="560" height="315" src="https://www.youtube.com/embed/hWihEDctPKA" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        <div class = 'widget'>
            <h3>Widget 03</h3>
        </div>
        </div>
    </div>
</body>

<script>

    var sp = ".";
    var today = new Date();
    console.log(today)

    var dd = today.getDate();
    var mm = today.getMonth() + 1;
    var yyyy = today.getFullYear();

    if(dd<10) dd="0"+dd;
    if(mm<10) mm="0"+mm;

    $("#date").html(mm+sp+dd+sp+yyyy);
</script>
</html>
